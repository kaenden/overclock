<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>CYBERVERSE</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='6' fill='%2300e5ff'/%3E%3C/svg%3E" />
    <!-- Cyberpunk/Valorant fontları: Chakra Petch (başlık) + Rajdhani (UI). Preload sahnesi yüklenmesini bekler. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
    <!-- CrazyGames SDK — RE-ENABLE this line when publishing to CrazyGames.
         Disabled for the GitHub Pages test build (off-CG it logs a benign "not initialized" console error).
         SdkBridge falls back to localStorage when the SDK is absent. -->
    <!-- <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script> -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #05060e;
        overflow: hidden;
        height: 100%;
        width: 100%;
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #game {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas { display: block; }

      /* Yatay-tasarım oyun: dokunmatik cihazda portre tutulursa çevirmeye yönlendir.
         Sadece (orientation: portrait) + (pointer: coarse) => masaüstü dar pencerede ASLA görmez. */
      #rotate {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #05060e;
        color: #00e5ff;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        font-family: "Rajdhani", "Chakra Petch", sans-serif;
        text-align: center;
        letter-spacing: 3px;
      }
      #rotate .ico {
        width: 64px;
        height: 64px;
        border: 3px solid #00e5ff;
        border-radius: 10px;
        animation: oc-rot 1.6s ease-in-out infinite;
        box-shadow: 0 0 18px #00e5ff66;
      }
      #rotate .t1 { font-size: 18px; font-weight: 700; }
      #rotate .t2 { font-size: 12px; color: #6a7bbd; letter-spacing: 1px; }
      @keyframes oc-rot {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(90deg); }
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate { display: flex; }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CHoJKSAA.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/phaser-CaWnzXme.js">
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate" aria-hidden="true">
      <div class="ico"></div>
      <div class="t1">CİHAZINI YATAY ÇEVİR</div>
      <div class="t2">ROTATE TO LANDSCAPE</div>
    </div>
  </body>
</html>
